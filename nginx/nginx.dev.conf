# PartFolder 3D — dev nginx config
# Proxies /api/ to the backend and everything else to the Vite dev server.
# Used in: docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build

server {
    listen 80;
    server_name _;

    # ── API proxy → backend (uvicorn --reload) ──
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    location = /health {
        proxy_pass http://backend:8000/health;
        proxy_set_header Host $host;
    }

    # ── Frontend → Vite dev server (port 5173) ──
    # Includes websocket upgrade for Vite HMR.
    location / {
        proxy_pass http://frontend:5173;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_http_version 1.1;
        proxy_read_timeout 60s;
    }
}
