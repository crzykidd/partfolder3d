# PartFolder 3D — production nginx config
# Serves the built frontend static files and proxies /api/ to the backend.
#
# This file defines only the plain :80 server — baked into the image and
# validated by `nginx -t` at build time. The optional :443 TLS server
# (TLS_MODE=selfsigned|provided) is generated at container START, not baked,
# by nginx/40-partfolder-tls.sh — see docs/tls.md. Both servers `include` the
# SAME shared config (nginx/partfolder-common.conf) so headers/CSP/locations
# are defined exactly once and can never drift between :80 and :443.

server {
    listen 80;
    server_name _;

    # Runtime-generated (see nginx/partfolder-redirect.conf) — empty by
    # default. Only becomes a 301-to-HTTPS redirect when TLS is on AND
    # TLS_REDIRECT=true.
    include /etc/nginx/partfolder-redirect.conf;

    include /etc/nginx/partfolder-common.conf;
}
