# PartFolder 3D — self-contained local-dev stack (all services + build).
#
#   docker compose -f docker-compose.dev.yml up --build
#
# Every service is defined here — this file does NOT layer on docker-compose.yml.
# Differences from production (docker-compose.yml):
#  - backend:  uvicorn --reload, source bind-mounted for live reload, DEBUG=true
#  - worker:   source bind-mounted (restart to pick up changes)
#  - frontend: Vite dev server with HMR (target: dev) instead of a static build
#  - nginx:    proxies / → Vite dev server (nginx.dev.conf) instead of static dist
#  - storage:  ALL data is bind-mounted under ./private_data/data/ on the host
#              (Postgres, Redis, and the app's /data) — no named volumes, so you
#              can inspect every file directly without entering containers.
#              ./private_data/ is gitignored.
#  - migrations: bundled into backend startup via the image entrypoint
#              (RUN_MIGRATIONS=true) — NO separate one-shot container.
#
# Required: copy .env.example → .env first (cp .env.example .env).

services:

  # ── PostgreSQL database ──
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - ./private_data/data/postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: partfolder3d
      POSTGRES_USER: partfolder3d
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-changeme}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U partfolder3d -d partfolder3d"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis (job queue broker) ──
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Password-protect Redis (mirrors production). REDIS_PASSWORD defaults to
    # "changeme" so the dev stack works with no .env; override in .env.
    command: redis-server --requirepass "${REDIS_PASSWORD:-changeme}"
    volumes:
      - ./private_data/data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── FastAPI backend: hot reload with uvicorn --reload ──
  # RUN_MIGRATIONS=true → the entrypoint runs `alembic upgrade head` before
  # uvicorn starts (bundled into this service; no separate migrate container).
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/crzykidd/partfolder3d:dev
    # user: "${PUID:-1000}:${PGID:-1000}"  # disabled in dev: bind-mounts are host-owned; only
    #   safe if PUID matches your host UID (run `id -u` to check). Enable in .env if needed.
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: "postgresql+asyncpg://partfolder3d:${POSTGRES_PASSWORD:-changeme}@db:5432/partfolder3d"
      REDIS_URL: "redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0"
      DATA_DIR: /data
      # Folders the admin "Add library" browser may pick from. Main lives at /library;
      # /library2 is a second, separate root (see the extra volume below). Add each
      # extra library's container mount path here or it won't appear in the picker.
      FS_BROWSE_ROOTS: '["/library","/library2"]'
      DEBUG: "true"
      RUN_MIGRATIONS: "true"
      # Dev runs over plain HTTP, so session/CSRF cookies must NOT be Secure
      # (browsers drop Secure cookies on http:// → you can never stay logged in).
      # Forced here so the dev stack works with no .env file. Prod defaults to
      # COOKIE_SECURE=true (https) — set it in .env for production.
      COOKIE_SECURE: "false"
    volumes:
      - ./backend:/app                       # source bind-mount for live reload
      - ./private_data/data/app:/data        # app data (config, thumbnails, inbox, renders…)
      - ./private_data/data/library:/library # dev library mount (add more via Admin → Libraries)
      - ./private_data/data/library2:/library2 # second, separate library root (browsable via FS_BROWSE_ROOTS)
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s                      # allow time for migrations + first reload

  # ── arq background worker: bind-mounted source ──
  # No RUN_MIGRATIONS; waits for backend to be healthy (migrations already applied).
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/crzykidd/partfolder3d:dev
    # user: "${PUID:-1000}:${PGID:-1000}"  # disabled in dev: same bind-mount caveat as backend
    command: ["python", "worker.py"]
    restart: unless-stopped
    # Hard resource ceiling so a bulk-import job flood can't overrun the host.
    # WORKER_CPUS confines the worker to N cores (leaving the rest for the API +
    # OS); WORKER_MEM_LIMIT OOM-kills the worker if it exceeds this, rather than
    # letting the whole machine run out of RAM. Tune both in .env.
    cpus: ${WORKER_CPUS:-2}
    mem_limit: ${WORKER_MEM_LIMIT:-3g}
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: "postgresql+asyncpg://partfolder3d:${POSTGRES_PASSWORD:-changeme}@db:5432/partfolder3d"
      REDIS_URL: "redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0"
      DATA_DIR: /data
      # Dev only: allow the default 'changeme' DB password (the backend service
      # sets this too). The prod compose deliberately omits DEBUG so it fails fast
      # unless a real POSTGRES_PASSWORD is set.
      DEBUG: "true"
      # Render thread caps — override the Dockerfile defaults from RENDER_CPU_THREADS.
      # All six vars must be set so every numeric-thread library sees the cap.
      RENDER_CPU_THREADS: "${RENDER_CPU_THREADS:-2}"
      OMP_NUM_THREADS: "${RENDER_CPU_THREADS:-2}"
      OPENBLAS_NUM_THREADS: "${RENDER_CPU_THREADS:-2}"
      MKL_NUM_THREADS: "${RENDER_CPU_THREADS:-2}"
      VECLIB_MAXIMUM_THREADS: "${RENDER_CPU_THREADS:-2}"
      NUMEXPR_NUM_THREADS: "${RENDER_CPU_THREADS:-2}"
      LP_NUM_THREADS: "${RENDER_CPU_THREADS:-2}"
    volumes:
      - ./backend:/app
      - ./private_data/data/app:/data
      - ./private_data/data/library:/library # dev library mount (same as backend)
      - ./private_data/data/library2:/library2 # second library root (mirror backend)
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy

  # ── Frontend: Vite dev server with HMR ──
  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
      target: dev
    # user: "${PUID:-1000}:${PGID:-1000}"  # disabled in dev: node_modules anonymous volume is
    #   root-owned (installed during image build); a non-root UID can't read it.
    ports:
      - "5173:5173"             # expose Vite directly (optional, for debugger access)
    volumes:
      - ./frontend/src:/app/src          # hot-reload source
      - ./frontend/public:/app/public    # public assets
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - /app/node_modules                # keep image's node_modules (anonymous volume)
    restart: unless-stopped

  # ── nginx reverse proxy: proxies / → Vite dev server, /api/ → backend ──
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8973}:80"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docs/images:/usr/share/nginx/html/img:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
