name: CodeQL

on:
  # The dev→main PR is the gate: pull_request scans changes BEFORE they can reach
  # main (the modern replacement for the old direct-to-main scan), and push:[main]
  # re-scans + keeps the default-branch baseline current. dev is intentionally NOT
  # a push trigger — scanning every dev push duplicated the pull_request run during
  # an open PR (stuck required checks) and added heavy load to frequent dev pushes.
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '30 4 * * 1'  # Monday 04:30 UTC

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript]
    steps:
      - uses: actions/checkout@v5

      - uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          # Security-focused suite; code style/quality is owned by ruff + tsc in CI.
          queries: security-extended

      - uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
