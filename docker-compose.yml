# PartFolder 3D — production deploy (pulls published images; no building required).
#
# Quick start:
#   1. cp .env.example .env          — set a strong POSTGRES_PASSWORD + APP_PORT
#   2. Edit the library mount(s) below in the `backend` and `worker` sections
#   3. docker compose up -d
#   4. Open http://localhost:8973 → complete the first-run wizard
#   5. Visit http://localhost:8973/quick-start for the in-app Quick Start guide
#
# Images:
#   ghcr.io/crzykidd/partfolder3d:latest          (backend + worker)
#   ghcr.io/crzykidd/partfolder3d-frontend:latest (frontend static build)
#   ghcr.io/crzykidd/partfolder3d-nginx:latest    (nginx — config + logos baked in)
# To pin a specific release swap :latest → e.g. :0.1.1
#
# Migrations run automatically: the backend entrypoint applies `alembic upgrade head`
# before uvicorn starts (RUN_MIGRATIONS=true); the worker waits for the backend to be
# healthy. No separate migration container and no manual migration step.
#
# Data durability: db_data, redis_data, and frontend_dist are named Docker volumes
# (survive container restarts/upgrades). ./data is bind-mounted for easy host access
# to thumbnails, config, backups, and logs.
#
# For local development with hot reload, use the self-contained dev file instead:
#   docker compose -f docker-compose.dev.yml up --build

services:

  # ── PostgreSQL database ──
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - db_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: partfolder3d
      POSTGRES_USER: partfolder3d
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-changeme}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U partfolder3d -d partfolder3d"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis (job queue broker) ──
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Password-protect Redis: arq deserializes job bodies, so write access to
    # the queue is code-execution in the worker. Not network-published today,
    # but requirepass is cheap defense-in-depth. Set REDIS_PASSWORD in .env.
    command: redis-server --requirepass "${REDIS_PASSWORD:-changeme}"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── FastAPI backend ──
  # RUN_MIGRATIONS=true → the image entrypoint runs `alembic upgrade head`
  # before uvicorn starts, so migrations are bundled into startup (no separate
  # one-shot container that would show as "exited" in docker ps / Portainer).
  backend:
    image: ghcr.io/crzykidd/partfolder3d:latest   # pin a version: :0.1.1
    user: "${PUID:-1000}:${PGID:-1000}"
    restart: unless-stopped
    env_file:
      - path: .env
        required: false   # .env is optional; env vars can be set directly
    environment:
      DATABASE_URL: "postgresql+asyncpg://partfolder3d:${POSTGRES_PASSWORD:-changeme}@db:5432/partfolder3d"
      REDIS_URL: "redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0"
      DATA_DIR: /data
      RUN_MIGRATIONS: "true"
    volumes:
      - ./data:/data
      # ── Library mounts ──────────────────────────────────────────────────────
      # Mount your 3D-print library directory (or directories) into the container.
      # Add the SAME bind-mounts to BOTH the `backend` and `worker` sections.
      # After first login, register each container path on the Libraries admin
      # page (Admin → Content → Libraries) to make it visible in the catalog.
      #
      # Uncomment and edit the host path on the left:
      #   - /mnt/nas/3dprints:/library/main   # <-- EDIT: host path → container path
      #   - /mnt/nas/minis:/library/minis     # add as many libraries as you need
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s     # allow time for migrations + boot

  # ── arq background worker ──
  worker:
    image: ghcr.io/crzykidd/partfolder3d:latest   # pin a version: :0.1.1
    user: "${PUID:-1000}:${PGID:-1000}"
    restart: unless-stopped
    command: ["python", "worker.py"]
    # Hard resource ceiling so a bulk-import job flood can't overrun the host.
    # WORKER_CPUS confines the worker to N cores (leaving the rest for the API +
    # OS); WORKER_MEM_LIMIT OOM-kills the worker if it exceeds this, rather than
    # letting the whole machine run out of RAM. Tune both in .env.
    cpus: ${WORKER_CPUS:-2}
    mem_limit: ${WORKER_MEM_LIMIT:-3g}
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: "postgresql+asyncpg://partfolder3d:${POSTGRES_PASSWORD:-changeme}@db:5432/partfolder3d"
      REDIS_URL: "redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0"
      DATA_DIR: /data
      # Render thread caps — override the Dockerfile defaults from RENDER_CPU_THREADS.
      # All six vars must be set so every numeric-thread library sees the cap.
      RENDER_CPU_THREADS: "${RENDER_CPU_THREADS:-2}"
      OMP_NUM_THREADS: "${RENDER_CPU_THREADS:-2}"
      OPENBLAS_NUM_THREADS: "${RENDER_CPU_THREADS:-2}"
      MKL_NUM_THREADS: "${RENDER_CPU_THREADS:-2}"
      VECLIB_MAXIMUM_THREADS: "${RENDER_CPU_THREADS:-2}"
      NUMEXPR_NUM_THREADS: "${RENDER_CPU_THREADS:-2}"
      LP_NUM_THREADS: "${RENDER_CPU_THREADS:-2}"
    volumes:
      - ./data:/data
      # ── Library mounts ──────────────────────────────────────────────────────
      # Mirror the backend library mounts exactly — the worker reads/writes the
      # same files (thumbnails, imports, etc.). Keep both sections in sync.
      #
      #   - /mnt/nas/3dprints:/library/main   # <-- EDIT: same mounts as backend
      #   - /mnt/nas/minis:/library/minis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy   # migrations run in backend startup

  # ── Frontend static build (populates frontend_dist for nginx to serve) ──
  frontend:
    image: ghcr.io/crzykidd/partfolder3d-frontend:latest   # pin a version: :0.1.1
    user: "${PUID:-1000}:${PGID:-1000}"
    volumes:
      - frontend_dist:/dist
    restart: "no"          # runs once to copy assets into the volume; nginx depends on completion

  # ── nginx reverse proxy (serves frontend + proxies /api/) ──
  # The nginx config and logo images are baked into the image — no bind-mounts
  # required for a pull-images-only host. Logos are served under /img/ from the
  # baked image layer; frontend static assets come from the frontend_dist volume.
  nginx:
    image: ghcr.io/crzykidd/partfolder3d-nginx:latest   # pin a version: :0.1.1
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8973}:80"
    volumes:
      - frontend_dist:/usr/share/nginx/html:ro
      # Optional: override the baked nginx config with a custom one.
      # Uncomment to supply your own default.conf (e.g. to add TLS termination,
      # adjust upload limits, or change proxy timeouts). Watch release notes for
      # "nginx config changed" callouts before upgrading — reconcile your copy.
      # - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      frontend:
        condition: service_completed_successfully
      backend:
        condition: service_healthy

volumes:
  db_data:
    driver: local
  redis_data:
    driver: local
  frontend_dist:
    driver: local
