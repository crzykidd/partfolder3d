name: CI

# Phase 0 (2026-06-27): bootstrap existence-guards removed now that backend/,
# frontend/, docker-compose.yml, Dockerfile, and alembic are all present.
# Jobs enforce for real from this commit onward.

on:
  # PR gate — pull_request ONLY. This is the required-check gate for dev→main.
  # IMPORTANT: main's branch-protection required checks are the BARE job names
  # ("Lint", "Test", "Config validation", …), because GitHub Actions binds
  # required status checks by check-run name, NOT "workflow / job". (They were
  # long mis-registered as "CI / Lint" etc., which matched nothing and left every
  # release PR stuck at "Expected — Waiting" → forced bypass; fixed 2026-07-02,
  # see docs/decisions.md.) So keep these job names stable and unique — the
  # non-required dev-checks.yml suffixes its jobs "(dev)" to avoid shadowing them.
  # CI runs only on the PR; post-merge image publishing is handled by publish.yml.
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Lint backend (ruff)
        run: |
          # Pin ruff to the project's version so CI matches local dev (an
          # unpinned install drifts to the latest ruff, which enforces newer
          # rules like UP042 that our pinned version + config don't).
          pip install "$(grep -iE '^ruff==' backend/requirements.txt)"
          ruff check backend/

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        run: npm ci
        working-directory: frontend
      - name: Type-check frontend (tsc --noEmit)
        run: npx tsc --noEmit
        working-directory: frontend
      - name: Run vitest
        run: npm test
        working-directory: frontend

  config-validate:
    name: Config validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - name: Validate config files
        run: |
          python3 << 'EOF'
          import json, yaml, glob, sys, os
          errors = []
          validated = []
          for f in ['docker-compose.yml', 'docker-compose.dev.yml']:
              if not os.path.exists(f):
                  print(f'Note: {f} not present yet — skipping')
                  continue
              try: yaml.safe_load(open(f).read()); validated.append(f)
              except Exception as e: errors.append(f'{f}: {e}')
          for f in ['.claude/settings.json', 'frontend/package.json'] + sorted(glob.glob('frontend/tsconfig*.json')):
              if not os.path.exists(f):
                  print(f'Note: {f} not present yet — skipping')
                  continue
              try: json.load(open(f)); validated.append(f)
              except Exception as e: errors.append(f'{f}: {e}')
          if errors:
              for e in errors: print(f'FAIL: {e}', file=sys.stderr)
              sys.exit(1)
          if validated:
              print('All config files valid:', ', '.join(validated))
          else:
              print('No config files present yet')
          EOF

  migration-check:
    name: Migration check
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: partfolder3d
          POSTGRES_USER: partfolder3d
          POSTGRES_PASSWORD: ci_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U partfolder3d -d partfolder3d"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      - name: Install backend deps
        run: pip install -r backend/requirements.txt
      - name: Run migrations to head
        env:
          DATABASE_URL: postgresql+asyncpg://partfolder3d:ci_test_password@localhost:5432/partfolder3d
          DATA_DIR: /tmp/alembic-check
        run: cd backend && alembic upgrade head
      - name: Assert at head
        env:
          DATABASE_URL: postgresql+asyncpg://partfolder3d:ci_test_password@localhost:5432/partfolder3d
          DATA_DIR: /tmp/alembic-check
        run: |
          cd backend && alembic current 2>&1 | grep -q '(head)' || \
            { echo 'ERROR: database is not at alembic head'; exit 1; }

  compose-validate:
    name: Compose validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Validate production compose
        run: docker compose config --quiet
      - name: Validate dev compose
        run: docker compose -f docker-compose.dev.yml config --quiet

  image-build:
    name: Image build
    runs-on: ubuntu-latest
    # The job always runs so the required "CI / Image build" check reports a
    # conclusion on push events too (a job skipped via job-level `if:` leaves the
    # required context unsatisfied → PRs stuck "blocked"). The actual build stays
    # PR-only so push events never build an image.
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v4
        if: github.event_name == 'pull_request'
      - name: Build Docker image (no push)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        # POSTGRES_USER creates a superuser account so workers can CREATE DATABASE.
        # Each xdist worker creates its own partfolder3d_gwN database, drops stale
        # state from previous runs, and runs alembic upgrade head independently.
        # The base partfolder3d DB is still migrated as a fallback for serial runs.
        image: postgres:16-alpine
        env:
          POSTGRES_DB: partfolder3d
          POSTGRES_USER: partfolder3d
          POSTGRES_PASSWORD: ci_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U partfolder3d -d partfolder3d"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      - name: Install backend deps
        run: pip install -r backend/requirements.txt
      - name: Apply migrations to base DB (serial-run fallback)
        env:
          DATABASE_URL: postgresql+asyncpg://partfolder3d:ci_test_password@localhost:5432/partfolder3d
          DATA_DIR: /tmp/pytest-data
        run: cd backend && alembic upgrade head
      - name: Run pytest (parallel)
        env:
          DATABASE_URL: postgresql+asyncpg://partfolder3d:ci_test_password@localhost:5432/partfolder3d
          DATA_DIR: /tmp/pytest-data
        run: cd backend && pytest -n auto
