name: Dev checks

# Fast, per-push feedback on the dev branch — NON-required checks. GitHub Actions
# binds branch-protection required checks by the BARE job name (e.g. "Lint",
# "Test"), NOT "workflow / job". main's required contexts are the bare ci.yml job
# names, so every job here is suffixed "(dev)" to guarantee a distinct check-run
# name that can never satisfy (or shadow) a required context. The heavy parallel
# Test, image build, and CodeQL run only on the dev→main PR (ci.yml / codeql.yml),
# so dev pushes stay cheap.
on:
  push:
    branches: [dev]

jobs:
  lint:
    name: Lint (dev)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Lint backend (ruff)
        run: |
          # Pin ruff to the project's version so CI matches local dev (an
          # unpinned install drifts to the latest ruff, which enforces newer
          # rules like UP042 that our pinned version + config don't).
          pip install "$(grep -iE '^ruff==' backend/requirements.txt)"
          ruff check backend/

  frontend:
    name: Frontend (dev)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        run: npm ci
        working-directory: frontend
      - name: Build frontend (tsc -b + vite build)
        run: npm run build
        working-directory: frontend
      - name: Run vitest
        run: npm test
        working-directory: frontend

  config-validate:
    name: Config validation (dev)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - name: Validate config files
        run: |
          python3 << 'EOF'
          import json, yaml, glob, sys, os
          errors = []
          validated = []
          for f in ['docker-compose.yml', 'docker-compose.dev.yml']:
              if not os.path.exists(f):
                  print(f'Note: {f} not present yet — skipping')
                  continue
              try: yaml.safe_load(open(f).read()); validated.append(f)
              except Exception as e: errors.append(f'{f}: {e}')
          for f in ['.claude/settings.json', 'frontend/package.json'] + sorted(glob.glob('frontend/tsconfig*.json')):
              if not os.path.exists(f):
                  print(f'Note: {f} not present yet — skipping')
                  continue
              try: json.load(open(f)); validated.append(f)
              except Exception as e: errors.append(f'{f}: {e}')
          if errors:
              for e in errors: print(f'FAIL: {e}', file=sys.stderr)
              sys.exit(1)
          if validated:
              print('All config files valid:', ', '.join(validated))
          else:
              print('No config files present yet')
          EOF

  compose-validate:
    name: Compose validation (dev)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Validate production compose
        run: docker compose config --quiet
      - name: Validate dev compose
        run: docker compose -f docker-compose.dev.yml config --quiet

  migration-check:
    name: Migration check (dev)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: partfolder3d
          POSTGRES_USER: partfolder3d
          POSTGRES_PASSWORD: ci_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U partfolder3d -d partfolder3d"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      - name: Install backend deps
        run: pip install -r backend/requirements.txt
      - name: Run migrations to head
        env:
          DATABASE_URL: postgresql+asyncpg://partfolder3d:ci_test_password@localhost:5432/partfolder3d
          DATA_DIR: /tmp/alembic-check
        run: cd backend && alembic upgrade head
      - name: Assert at head
        env:
          DATABASE_URL: postgresql+asyncpg://partfolder3d:ci_test_password@localhost:5432/partfolder3d
          DATA_DIR: /tmp/alembic-check
        run: |
          cd backend && alembic current 2>&1 | grep -q '(head)' || \
            { echo 'ERROR: database is not at alembic head'; exit 1; }
