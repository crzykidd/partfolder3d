# PartFolder 3D — production nginx config
# Serves the built frontend static files and proxies /api/ to the backend.

server {
    listen 80;
    server_name _;

    # Allow large model/asset uploads (3MF/STL/ZIP can be hundreds of MB).
    # nginx defaults to 1m, which rejects even a few-MB upload with HTTP 413.
    client_max_body_size 1024m;

    # ── Security headers (applied to the served HTML document) ──
    # `always` so they're sent on error responses too. Don't assume the outer
    # reverse proxy adds them. NOTE: nginx `add_header` is NOT inherited into a
    # location that declares its own add_header — the static-asset location below
    # re-asserts nosniff for that reason. The index.html document (served by
    # `location /`, which has no add_header) inherits all of these.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    # CSP tuned for the Vite/React SPA: all JS/CSS is same-origin (no CDN, no
    # inline <script>, no eval, no web workers/wasm). 'unsafe-inline' is needed
    # only for styles (React inline style attributes + Vite-injected CSS).
    # img-src allows data:/blob: (Vite inlines small assets as data URIs; the
    # 3D viewer/capture may use blob:). connect-src 'self' = same-origin /api.
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'; font-src 'self' data:; frame-ancestors 'none'; base-uri 'self'; object-src 'none'" always;

    # ── Built frontend static assets ──
    root /usr/share/nginx/html;
    index index.html;

    # Efficient static file serving for the built frontend's OWN assets.
    # NOTE: this regex matches ANY *.png/*.js/... URL, incl. /api/items/.../x.png
    # and /img/logo.png. Regex locations are evaluated BEFORE plain prefixes, so
    # the /api/ and /img/ locations below use `^~` to take precedence and stop the
    # regex from stealing (and 404-ing) proxied images / baked logos.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # This location declares add_header, so the server-level security headers
        # above are NOT inherited here — re-assert nosniff on static assets.
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # ── API proxy → backend (^~ so /api/*.png is proxied, not caught by the regex above) ──
    location ^~ /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # /health proxied to backend (liveness probes hit this)
    location = /health {
        proxy_pass http://backend:8000/health;
        proxy_set_header Host $host;
    }

    # ── Baked logo / brand images ──
    # Served from the image layer at /usr/share/nginx/img/ (not the frontend_dist
    # volume), so logos are always available even before the volume is populated.
    location ^~ /img/ {
        alias /usr/share/nginx/img/;
    }

    # ── SPA fallback: all other paths → index.html ──
    location / {
        try_files $uri $uri/ /index.html;
    }
}
