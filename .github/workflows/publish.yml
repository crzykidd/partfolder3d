name: Build and publish Docker images

on:
  push:
    branches: [dev, main]
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    name: Build and push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check for Dockerfile
        id: check-dockerfile
        run: |
          if [ -f Dockerfile ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "No Dockerfile yet — nothing to publish"
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-buildx-action@v4
        if: steps.check-dockerfile.outputs.present == 'true'

      - uses: docker/login-action@v4
        if: steps.check-dockerfile.outputs.present == 'true'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v6
        if: steps.check-dockerfile.outputs.present == 'true'
        id: meta
        with:
          images: ghcr.io/crzykidd/partfolder3d
          tags: |
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/dev' }}
            type=sha,prefix=sha-,format=short,enable=${{ github.event_name == 'push' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.event_name == 'release' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}

      - uses: docker/build-push-action@v7
        if: steps.check-dockerfile.outputs.present == 'true'
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
