name: CI

# Bootstrap tolerance: every job guards its real commands behind file/directory
# existence checks so the workflow passes cleanly on an empty repo. Remove each
# guard per-job as scaffolding adds the corresponding piece (backend/, frontend/,
# docker-compose.yml, Dockerfile, etc.).

on:
  # Push-only (no pull_request). Every dev push gets the full CI feedback, and the
  # dev→main PR's required checks are satisfied by the head commit's push run
  # (branch protection is non-strict). Triggering on both push AND pull_request
  # produced duplicate same-named check runs that left required checks stuck at
  # "Expected — Waiting for status to be reported", forcing a manual merge bypass.
  push:
    branches: [dev, main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Lint backend (ruff)
        run: |
          if [ -d backend ]; then
            pip install ruff
            ruff check backend/
          else
            echo "no backend/ yet — bootstrap tolerance, skipping"
          fi

      - uses: actions/setup-node@v5
        if: hashFiles('frontend/package.json') != ''
        with:
          node-version: "22"
      - run: npm ci
        if: hashFiles('frontend/package.json') != ''
        working-directory: frontend
      - run: npx tsc --noEmit
        if: hashFiles('frontend/package.json') != ''
        working-directory: frontend

  config-validate:
    name: Config validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - name: Validate config files
        run: |
          python3 << 'EOF'
          import json, yaml, glob, sys, os
          errors = []
          validated = []
          for f in ['docker-compose.yml', 'docker-compose.dev.yml']:
              if not os.path.exists(f):
                  print(f'Note: {f} not present yet — bootstrap tolerance, skipping')
                  continue
              try: yaml.safe_load(open(f).read()); validated.append(f)
              except Exception as e: errors.append(f'{f}: {e}')
          for f in ['.claude/settings.json', 'frontend/package.json'] + sorted(glob.glob('frontend/tsconfig*.json')):
              if not os.path.exists(f):
                  print(f'Note: {f} not present yet — bootstrap tolerance, skipping')
                  continue
              try: json.load(open(f)); validated.append(f)
              except Exception as e: errors.append(f'{f}: {e}')
          if errors:
              for e in errors: print(f'FAIL: {e}', file=sys.stderr)
              sys.exit(1)
          if validated:
              print('All config files valid:', ', '.join(validated))
          else:
              print('No config files present yet — bootstrap tolerance, nothing to validate')
          EOF

  migration-check:
    name: Migration check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Run migrations to head
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/partfolder3d
          DATA_DIR: /tmp/alembic-check
        run: |
          if [ -d backend/alembic ] || [ -f backend/alembic.ini ]; then
            pip install -r backend/requirements.txt
            cd backend && alembic upgrade head
          else
            echo "no alembic setup found yet — bootstrap tolerance, skipping"
          fi
      - name: Assert at head
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/partfolder3d
          DATA_DIR: /tmp/alembic-check
        run: |
          if [ -d backend/alembic ] || [ -f backend/alembic.ini ]; then
            cd backend && alembic current 2>&1 | grep -q '(head)' || \
              { echo 'ERROR: database is not at alembic head'; exit 1; }
          else
            echo "no alembic setup found yet — bootstrap tolerance, skipping"
          fi

  compose-validate:
    name: Compose validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: |
          if [ -f docker-compose.yml ]; then
            docker compose config --quiet
          else
            echo "no compose yet — bootstrap tolerance, skipping"
          fi

  image-build:
    name: Image build
    runs-on: ubuntu-latest
    # The job always runs so the required "CI / Image build" check reports a
    # conclusion on push events too (a job skipped via job-level `if:` leaves the
    # required context unsatisfied → PRs stuck "blocked"). The actual build stays
    # PR-only so push events never build an image, and additionally requires a
    # Dockerfile (bootstrap tolerance).
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v4
        if: github.event_name == 'pull_request' && hashFiles('Dockerfile') != ''
      - name: Build Docker image (no push)
        if: github.event_name == 'pull_request' && hashFiles('Dockerfile') != ''
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Run tests
        run: |
          if [ -d backend ] && find backend \( -name "test_*.py" -o -name "*_test.py" \) | grep -q .; then
            pip install -r backend/requirements.txt
            cd backend && pytest
          else
            echo "no backend tests found yet — bootstrap tolerance, skipping"
          fi
