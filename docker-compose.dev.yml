# PartFolder 3D — dev overrides for docker-compose.yml
#
# INTENDED LOCAL DEV WORKFLOW:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
#
# What this does differently from production:
#  - backend: uvicorn --reload (hot reloads on source changes)
#  - worker:  bind-mounted source (restart to pick up changes)
#  - frontend: Vite dev server (HMR on :5173)
#  - nginx: proxies / → Vite dev server (port 5173) instead of serving static dist
#
# Source bind-mounts replace the image's /app directory; node_modules / pip packages
# installed in the image are preserved via anonymous volume exclusions.

services:

  # ── Backend: hot reload with uvicorn --reload ──
  backend:
    # Use local source via bind-mount; the image already has deps installed.
    build:
      context: .
      dockerfile: Dockerfile
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - ./backend:/app          # source bind-mount for live reload
    environment:
      DEBUG: "true"

  # ── Worker: bind-mounted source ──
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "worker.py"]
    volumes:
      - ./backend:/app

  # ── Frontend: Vite dev server with HMR ──
  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
      target: dev
    ports:
      - "5173:5173"             # expose Vite directly (optional, for debugger access)
    volumes:
      - ./frontend/src:/app/src          # hot-reload source
      - ./frontend/public:/app/public    # public assets
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
      # node_modules stays from the image (anonymous volume takes precedence)
      - /app/node_modules
    restart: unless-stopped

  # ── nginx: proxy to Vite dev server instead of serving static dist ──
  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docs/images:/usr/share/nginx/html/img:ro
    depends_on:
      - backend
      - frontend
