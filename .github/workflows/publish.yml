name: Build and publish Docker images

# Phase 0 (2026-06-27): removed the "Check for Dockerfile" bootstrap guard —
# the Dockerfile now exists. The build runs normally on all trigger events.
# Phase 11 (2026-07-02): expanded to a 3-image matrix — backend, frontend, nginx.

on:
  push:
    branches: [dev, main]
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    name: Build and push ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # Backend + worker — root Dockerfile, context is repo root.
          - name: backend
            image: ghcr.io/crzykidd/partfolder3d
            context: .

          # Frontend static build — frontend/Dockerfile prod target.
          - name: frontend
            image: ghcr.io/crzykidd/partfolder3d-frontend
            context: ./frontend
            target: prod

          # nginx reverse proxy — nginx/Dockerfile bakes config + logo images.
          - name: nginx
            image: ghcr.io/crzykidd/partfolder3d-nginx
            context: .
            dockerfile: nginx/Dockerfile

    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/dev' }}
            type=sha,prefix=sha-,format=short,enable=${{ github.event_name == 'push' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.event_name == 'release' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}

      - uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
